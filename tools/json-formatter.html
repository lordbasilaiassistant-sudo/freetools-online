<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter &amp; Validator - DevToolKit</title>
  <meta name="description" content="Free online JSON formatter and validator. Paste messy JSON, get it beautifully formatted with syntax highlighting. Validates and shows errors.">
  <meta name="keywords" content="JSON formatter, JSON validator, JSON beautifier, JSON minifier, pretty print JSON, free online tool">
  <link rel="canonical" href="https://drlor.github.io/freetools-online/tools/json-formatter.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .json-error { color: #f85149; font-size: .85rem; margin-top: .5rem; font-family: var(--mono); }
    .json-success { color: var(--green); font-size: .85rem; margin-top: .5rem; }
    #jsonOutput { min-height: 220px; white-space: pre-wrap; word-break: break-all; }
    .indent-select { width: auto; display: inline-flex; padding: .4rem .75rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a href="../" class="logo"><span>&gt;_</span> DevToolKit</a>
      <nav class="header-nav"><a href="../#tools">All Tools</a></nav>
    </div>
  </header>
  <main>
    <div class="tool-page-header">
      <div class="breadcrumb"><a href="../">Home</a> / JSON Formatter</div>
      <h1>JSON Formatter &amp; Validator</h1>
      <p>Paste your JSON to format, validate, or minify it instantly.</p>
    </div>
    <div class="tool-container">
      <div class="tool-row">
        <div class="tool-col">
          <label for="jsonInput">Input</label>
          <textarea id="jsonInput" placeholder='{"example": "paste your JSON here", "count": 42}'></textarea>
        </div>
        <div class="tool-col">
          <label>Output</label>
          <textarea id="jsonOutput" readonly></textarea>
        </div>
      </div>
      <div id="statusMsg"></div>
      <div class="btn-row">
        <button class="btn btn--primary" onclick="formatJSON()">Format</button>
        <button class="btn" onclick="minifyJSON()">Minify</button>
        <button class="btn" onclick="copyOutput()">Copy Output</button>
        <button class="btn" onclick="clearAll()">Clear</button>
        <label style="display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--text-muted);margin-left:.5rem;">
          Indent:
          <select id="indentSize" class="indent-select">
            <option value="2" selected>2 spaces</option>
            <option value="4">4 spaces</option>
            <option value="tab">Tab</option>
          </select>
        </label>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <footer class="site-footer"><p>DevToolKit - Free tools, zero tracking.</p></footer>
  <script>
    function getIndent() {
      const v = document.getElementById("indentSize").value;
      return v === "tab" ? "\t" : parseInt(v);
    }
    function formatJSON() {
      const input = document.getElementById("jsonInput").value.trim();
      const output = document.getElementById("jsonOutput");
      const status = document.getElementById("statusMsg");
      if (!input) { status.innerHTML = ""; output.value = ""; return; }
      try {
        const parsed = JSON.parse(input);
        output.value = JSON.stringify(parsed, null, getIndent());
        const keys = countKeys(parsed);
        status.innerHTML = '<span class="json-success">Valid JSON \u2014 ' + keys + " key" + (keys !== 1 ? "s" : "") + " found</span>";
      } catch (e) {
        output.value = "";
        status.innerHTML = '<span class="json-error">Error: ' + e.message + "</span>";
      }
    }
    function minifyJSON() {
      const input = document.getElementById("jsonInput").value.trim();
      const output = document.getElementById("jsonOutput");
      const status = document.getElementById("statusMsg");
      if (!input) { status.innerHTML = ""; output.value = ""; return; }
      try {
        const parsed = JSON.parse(input);
        output.value = JSON.stringify(parsed);
        status.innerHTML = '<span class="json-success">Minified \u2014 ' + output.value.length + " characters</span>";
      } catch (e) {
        output.value = "";
        status.innerHTML = '<span class="json-error">Error: ' + e.message + "</span>";
      }
    }
    function countKeys(obj) {
      if (typeof obj !== "object" || obj === null) return 0;
      if (Array.isArray(obj)) return obj.reduce((sum, item) => sum + countKeys(item), 0);
      return Object.keys(obj).length + Object.values(obj).reduce((sum, val) => sum + countKeys(val), 0);
    }
    function copyOutput() {
      const text = document.getElementById("jsonOutput").value;
      if (text) { navigator.clipboard.writeText(text); showToast("Copied to clipboard!"); }
    }
    function clearAll() {
      document.getElementById("jsonInput").value = "";
      document.getElementById("jsonOutput").value = "";
      document.getElementById("statusMsg").innerHTML = "";
    }
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }
    document.getElementById("jsonInput").addEventListener("paste", () => { setTimeout(formatJSON, 50); });
  </script>
</body>
</html>
