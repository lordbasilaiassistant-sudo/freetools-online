<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker &amp; Converter - DevToolKit</title>
  <meta name="description" content="Free online color picker and converter. Get HEX, RGB, and HSL values for any color. Copy values with one click.">
  <meta name="keywords" content="color picker, hex to rgb, rgb to hsl, color converter, CSS colors, free online tool">
  <link rel="canonical" href="https://lordbasilaiassistant-sudo.github.io/freetools-online/tools/color-picker.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a href="../" class="logo"><span>&gt;_</span> DevToolKit</a>
      <nav class="header-nav"><a href="../#tools">All Tools</a></nav>
    </div>
  </header>
  <main>
    <div class="tool-page-header">
      <div class="breadcrumb"><a href="../">Home</a> / Color Picker</div>
      <h1>Color Picker &amp; Converter</h1>
      <p>Pick a color or enter a value to convert between HEX, RGB, and HSL.</p>
    </div>
    <div class="tool-container">
      <div class="tool-row">
        <div class="tool-col">
          <label>Pick a Color</label>
          <div class="color-input-row">
            <input type="color" id="colorPicker" value="#58a6ff">
            <input type="text" id="hexInput" value="#58a6ff" placeholder="#58a6ff">
          </div>
          <div class="color-display" id="colorDisplay" style="background:#58a6ff"></div>
          <label style="margin-top:1rem">Quick Palette</label>
          <div class="palette" id="palette"></div>
        </div>
        <div class="tool-col">
          <label>Color Values <span style="font-weight:400;font-size:.75rem;color:var(--text-muted)">(click to copy)</span></label>
          <div class="color-values">
            <div class="color-val" onclick="copyVal('hex')">
              <div class="label">HEX</div>
              <div class="value" id="valHex">#58a6ff</div>
            </div>
            <div class="color-val" onclick="copyVal('rgb')">
              <div class="label">RGB</div>
              <div class="value" id="valRgb">rgb(88, 166, 255)</div>
            </div>
            <div class="color-val" onclick="copyVal('hsl')">
              <div class="label">HSL</div>
              <div class="value" id="valHsl">hsl(212, 100%, 67%)</div>
            </div>
            <div class="color-val" onclick="copyVal('css')">
              <div class="label">CSS Variable</div>
              <div class="value" id="valCss">--color: #58a6ff;</div>
            </div>
          </div>
          <label style="margin-top:1.25rem">Shades</label>
          <div class="palette" id="shades"></div>
        </div>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <footer class="site-footer"><p>DevToolKit - Free tools, zero tracking.</p></footer>
  <script>
    const picker = document.getElementById("colorPicker");
    const hexInput = document.getElementById("hexInput");
    const display = document.getElementById("colorDisplay");
    const paletteColors = [
      "#ef4444","#f97316","#eab308","#22c55e","#06b6d4",
      "#3b82f6","#8b5cf6","#ec4899","#f43f5e","#14b8a6",
      "#6366f1","#a855f7","#64748b","#1e293b","#ffffff","#000000"
    ];
    function initPalette() {
      const el = document.getElementById("palette");
      paletteColors.forEach(c => {
        const s = document.createElement("div");
        s.className = "palette-swatch";
        s.style.background = c;
        s.onclick = () => setColor(c);
        el.appendChild(s);
      });
    }
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return {r, g, b};
    }
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch(max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }
    function generateShades(hex) {
      const {r, g, b} = hexToRgb(hex);
      const {h, s} = rgbToHsl(r, g, b);
      const shadesEl = document.getElementById("shades");
      shadesEl.innerHTML = "";
      for (let l = 95; l >= 5; l -= 10) {
        const sw = document.createElement("div");
        sw.className = "palette-swatch";
        const color = "hsl(" + h + "," + s + "%," + l + "%)";
        sw.style.background = color;
        sw.onclick = () => {
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = 1;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = color;
          ctx.fillRect(0,0,1,1);
          const data = ctx.getImageData(0,0,1,1).data;
          const newHex = "#" + [data[0],data[1],data[2]].map(x => x.toString(16).padStart(2,"0")).join("");
          setColor(newHex);
        };
        shadesEl.appendChild(sw);
      }
    }
    function setColor(hex) {
      hex = hex.toLowerCase();
      if (!/^#[0-9a-f]{6}$/.test(hex)) return;
      picker.value = hex;
      hexInput.value = hex;
      display.style.background = hex;
      const {r, g, b} = hexToRgb(hex);
      const {h, s, l} = rgbToHsl(r, g, b);
      document.getElementById("valHex").textContent = hex;
      document.getElementById("valRgb").textContent = "rgb(" + r + ", " + g + ", " + b + ")";
      document.getElementById("valHsl").textContent = "hsl(" + h + ", " + s + "%, " + l + "%)";
      document.getElementById("valCss").textContent = "--color: " + hex + ";";
      generateShades(hex);
    }
    function copyVal(type) {
      const map = {hex:"valHex", rgb:"valRgb", hsl:"valHsl", css:"valCss"};
      const text = document.getElementById(map[type]).textContent;
      navigator.clipboard.writeText(text);
      showToast("Copied: " + text);
    }
    picker.addEventListener("input", e => setColor(e.target.value));
    hexInput.addEventListener("input", e => {
      let v = e.target.value;
      if (v.length === 7 && /^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
    });
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }
    initPalette();
    setColor("#58a6ff");
  </script>
</body>
</html>
